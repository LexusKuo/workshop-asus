[tool.pytest.ini_options]
addopts = "-q -m 'not lab1'"
markers = [
  "lab1: acceptance tests for Lab 1; run with pytest -q -m lab1",
  "lab2: regression tests for Lab 2; run with pytest -q -m lab2",
]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
